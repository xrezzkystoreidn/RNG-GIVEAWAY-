<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Upload Bukti Transfer – ANDIKZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--bg2:#0e1117;--bg3:#141820;--bg4:#1a1f2b;
  --ac:#00e5a0;--ac2:#00b87a;--red:#ef4444;--yel:#f59e0b;
  --t1:#edf0fa;--t2:#9aa5c0;--t3:#4e5a78;
  --bdr:rgba(255,255,255,.05);--bdr2:rgba(255,255,255,.09);--bdr3:rgba(0,229,160,.18);
  --sh:0 8px 40px rgba(0,0,0,.7);--r:14px;--r2:8px;
  --f:'Outfit',sans-serif;--m:'DM Mono',monospace;--d:'Syne',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:var(--f);font-size:15px;line-height:1.65;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 80% -10%,rgba(0,229,160,.07) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at -10% 80%,rgba(59,130,246,.05) 0%,transparent 60%);
  pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;opacity:.5}

#TOAST{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:7px}
.tm{background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r2);padding:10px 14px;font-size:.8rem;font-weight:500;box-shadow:var(--sh);animation:tIn .3s;max-width:300px}
.tm.ok{border-left:3px solid var(--ac)}.tm.err{border-left:3px solid var(--red)}.tm.warn{border-left:3px solid var(--yel)}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}

.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px}
.hdr{text-align:center;margin-bottom:28px}
.hlogo{font-family:var(--d);font-size:1.6rem;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
.hlogo b{color:var(--ac)}
.hpill{display:inline-flex;align-items:center;gap:6px;background:rgba(0,229,160,.08);border:1px solid var(--bdr3);color:var(--ac);font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:99px}
.hpill::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r);width:100%;max-width:470px;overflow:hidden;box-shadow:var(--sh)}
.chd{padding:20px 24px 0;border-bottom:1px solid var(--bdr)}
.steps{display:flex;align-items:center;margin-bottom:18px}
.sd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;font-family:var(--m);flex-shrink:0;border:2px solid var(--bdr2);color:var(--t3);background:var(--bg3);transition:.3s}
.sd.done{background:var(--ac);border-color:var(--ac);color:#08090d}
.sd.active{border-color:var(--ac);color:var(--ac);background:rgba(0,229,160,.08)}
.sl{flex:1;height:2px;background:var(--bdr2);transition:.3s}
.sl.done{background:var(--ac)}
.ctitle{font-family:var(--d);font-size:1rem;font-weight:800;padding-bottom:14px}
.cbd{padding:20px 24px}

.fg{margin-bottom:14px}
.fg label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r2);padding:10px 13px;color:var(--t1);font-size:.88rem;outline:none;transition:.2s;font-family:var(--f)}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,229,160,.1)}
.fi::placeholder{color:var(--t3)}
.pfxw{position:relative}
.pfxw .pfx{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-family:var(--m);font-size:.83rem;pointer-events:none}
.pfxw .fi{padding-left:40px;font-family:var(--m)}

.btn{width:100%;background:var(--ac);color:#08090d;border:none;border-radius:var(--r2);padding:12px;font-size:.88rem;font-weight:700;font-family:var(--d);letter-spacing:.04em;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn:hover:not(:disabled){background:var(--ac2);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btg{background:transparent;color:var(--t2);border:1px solid var(--bdr2);font-family:var(--f)}
.btg:hover:not(:disabled){background:var(--bg4);color:var(--t1);transform:none}

.info{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:12px 14px;margin-bottom:14px}
.info.g{border-color:rgba(0,229,160,.22);background:rgba(0,229,160,.05)}
.info.y{border-color:rgba(245,158,11,.22);background:rgba(245,158,11,.05)}
.info.r{border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.05)}
.ilbl{font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.info.g .ilbl{color:var(--ac)}.info.y .ilbl{color:var(--yel)}.info.r .ilbl{color:var(--red)}
.ival{font-size:.88rem;font-weight:600;color:var(--t1)}
.isub{font-size:.76rem;color:var(--t3);margin-top:3px}

.depcard{background:var(--bg3);border:1px solid var(--bdr3);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.drow{display:flex;align-items:baseline;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bdr)}
.drow:last-child{border-bottom:none}
.dk{font-size:.7rem;color:var(--t3);font-weight:600}
.dv{font-size:.83rem;font-weight:600;color:var(--t1);text-align:right;font-family:var(--m)}
.damt{font-family:var(--d);font-size:1.5rem;font-weight:800;color:var(--ac);margin:7px 0 3px}

.uzone{border:2px dashed var(--bdr2);border-radius:var(--r2);padding:28px 18px;text-align:center;cursor:pointer;transition:.25s;position:relative;overflow:hidden;background:var(--bg3)}
.uzone:hover,.uzone.drag{border-color:var(--ac);background:rgba(0,229,160,.05)}
.uzone.has{border-color:var(--ac);border-style:solid;background:rgba(0,229,160,.05)}
.uzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.uico{font-size:2rem;margin-bottom:8px;transition:.2s}
.uzone:hover .uico,.uzone.drag .uico{transform:scale(1.08)}
.utitle{font-weight:700;font-size:.88rem;margin-bottom:3px}
.usub{font-size:.74rem;color:var(--t3)}
.utypes{display:flex;gap:5px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.utype{background:var(--bg4);border:1px solid var(--bdr2);color:var(--t3);font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px}

.pvw{margin-bottom:12px;position:relative}
.pvwimg{width:100%;border-radius:var(--r2);border:2px solid var(--bdr3);display:block;max-height:260px;object-fit:contain;background:var(--bg)}
.pvwclr{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.75);border:none;color:var(--t1);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.pvwclr:hover{background:var(--red)}
.pvwname{font-size:.72rem;color:var(--t3);text-align:center;margin-top:5px;font-family:var(--m)}

.pbg{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-bottom:4px}
.pbar{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:99px;transition:width .3s;width:0%}
.plbl{font-size:.72rem;color:var(--t3);text-align:center}

.succ{text-align:center;padding:6px 0}
.succ-ico{font-size:3rem;margin-bottom:10px;animation:pop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.succ-title{font-family:var(--d);font-size:1.25rem;font-weight:800;color:var(--ac);margin-bottom:7px}
.succ-msg{font-size:.83rem;color:var(--t3);line-height:1.7}
.succ-id{font-family:var(--m);font-size:.78rem;background:var(--bg3);border:1px solid var(--bdr3);color:var(--ac);padding:5px 12px;border-radius:99px;display:inline-block;margin:10px 0}

.aimg{width:100%;border-radius:var(--r2);border:2px solid var(--bdr3);margin:10px 0;max-height:220px;object-fit:contain;background:var(--bg)}

.spin{width:15px;height:15px;border:2.5px solid rgba(8,9,13,.25);border-top-color:#08090d;border-radius:50%;animation:rot .65s linear infinite;flex-shrink:0}
.spin-lt{border-color:rgba(255,255,255,.15);border-top-color:var(--ac)}
@keyframes rot{to{transform:rotate(360deg)}}

.or{display:flex;align-items:center;gap:9px;margin:12px 0;font-size:.72rem;color:var(--t3)}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--bdr2)}
.foot{text-align:center;font-size:.73rem;color:var(--t3);margin-top:18px;max-width:380px}
.foot strong{color:var(--t2)}

@media(max-width:500px){.cbd,.chd{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<div id="TOAST"></div>
<div class="wrap">
  <div class="hdr">
    <div class="hlogo">ANDIKZ<b>.</b></div>
    <div class="hpill">Upload Bukti Transfer</div>
  </div>
  <div class="card">
    <div class="chd">
      <div class="steps">
        <div class="sd active" id="s1">1</div>
        <div class="sl" id="sl1"></div>
        <div class="sd" id="s2">2</div>
        <div class="sl" id="sl2"></div>
        <div class="sd" id="s3">3</div>
      </div>
      <div class="ctitle" id="CTITLE">Verifikasi Nomor WA</div>
    </div>
    <div class="cbd" id="CBODY"></div>
  </div>
  <div class="foot">Butuh bantuan? Hubungi admin via <strong>WhatsApp</strong>.<br/>Bukti diproses max <strong>1×24 jam</strong> hari kerja.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, update, query, orderByChild, equalTo }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ── Config Firebase baru ─────────────────────────── */
const FB = {
  apiKey:            "AIzaSyAkPb8d4RgwdNiaMz4UUSCvILrHd4QBoTw",
  authDomain:        "accdeposit-422a2.firebaseapp.com",
  databaseURL:       "https://accdeposit-422a2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "accdeposit-422a2",
  storageBucket:     "accdeposit-422a2.firebasestorage.app",
  messagingSenderId: "862661580804",
  appId:             "1:862661580804:web:271273f9edcc03ee717d51"
};
/* ── Cloudinary ────────────────────────────────────── */
const CLOUD_NAME   = 'dikzqimfm1';
const CLOUD_PRESET = 'acc_deposit';  // unsigned
const UPLOAD_URL   = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

const fbApp = initializeApp(FB);
const db    = getDatabase(fbApp);

/* ── State ─────────────────────────────────────────── */
const S = {
  step: 1,
  phone: '',
  depKey: '',
  depData: null,
  file: null,
  previewUrl: null
};

/* ── Helpers ───────────────────────────────────────── */
const fmt  = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');
const fmtD = ts => {
  if (!ts) return '–';
  return new Date(Number(ts)).toLocaleString('id-ID', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
};
const toast = (msg, t='ok') => {
  const el = document.createElement('div');
  el.className = `tm ${t}`;
  el.textContent = (t==='ok'?'✅':t==='warn'?'⚠️':'❌') + ' ' + msg;
  document.getElementById('TOAST').appendChild(el);
  setTimeout(() => el.remove(), 5000);
};

// Normalize nomor WA → 628xxx (tanpa + tanpa spasi)
const cleanPhone = raw => {
  let p = raw.replace(/\D/g, '');
  if (p.startsWith('0'))  p = '62' + p.slice(1);
  if (p.startsWith('+'))  p = p.slice(1);
  if (!p.startsWith('62')) p = '62' + p;
  return p;
};

/* ── Step Navigation ───────────────────────────────── */
function goStep(n) {
  S.step = n;
  for (let i = 1; i <= 3; i++) {
    const d = document.getElementById('s' + i);
    d.classList.remove('active', 'done');
    if (i < n) d.classList.add('done');
    else if (i === n) d.classList.add('active');
  }
  for (let i = 1; i <= 2; i++) {
    document.getElementById('sl' + i).classList.toggle('done', i < n);
  }
  const titles = [
    'Verifikasi Nomor WA',
    'Upload Bukti Transfer',
    'Selesai — Tunggu Konfirmasi Admin'
  ];
  document.getElementById('CTITLE').textContent = titles[n - 1];
  if (n === 1) step1();
  else if (n === 2) step2();
  else step3();
}

/* ══════════════════════════════════════════════════════
   STEP 1: Input & Verifikasi Nomor WA
   Cek ke RTDB apakah ada deposit pending atas nomor ini
══════════════════════════════════════════════════════ */
function step1() {
  document.getElementById('CBODY').innerHTML = `
    <p style="font-size:.83rem;color:var(--t3);margin-bottom:16px;line-height:1.7">
      Masukkan nomor WhatsApp yang kamu pakai saat request deposit.<br/>
      Sistem cek langsung ke <strong style="color:var(--ac)">Realtime Database</strong> — hanya nomor dengan
      deposit <strong style="color:var(--yel)">pending</strong> yang bisa upload bukti.
    </p>
    <div class="fg">
      <label>Nomor WhatsApp</label>
      <div class="pfxw">
        <span class="pfx">+62</span>
        <input id="inpPhone" class="fi" type="tel" placeholder="81234567890" maxlength="14"
          value="${S.phone ? S.phone.replace(/^62/, '') : ''}"/>
      </div>
    </div>
    <div id="s1err" style="color:var(--red);font-size:.78rem;min-height:15px;margin-bottom:11px;line-height:1.5"></div>
    <button class="btn" id="btnCek" onclick="doVerify()">🔍 Cek Deposit Saya</button>
    <div class="or">catatan</div>
    <p style="font-size:.76rem;color:var(--t3);text-align:center;line-height:1.7">
      • Nomor harus sama persis dengan yang dipakai ke bot<br/>
      • 1 nomor = max 1 deposit pending di waktu yang sama<br/>
      • Setelah upload, admin akan verifikasi & acc otomatis
    </p>
  `;
  const inp = document.getElementById('inpPhone');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doVerify(); });
  setTimeout(() => inp.focus(), 100);
}

/* ── STEP 1 ACTION: Query RTDB cek pending ─────────── */
window.doVerify = async () => {
  const raw   = document.getElementById('inpPhone').value.trim();
  const errEl = document.getElementById('s1err');
  errEl.textContent = '';

  if (!raw || raw.replace(/\D/g,'').length < 6) {
    errEl.textContent = 'Masukkan nomor WA yang valid.';
    return;
  }

  const phone = cleanPhone(raw);
  S.phone = phone;

  const btn = document.getElementById('btnCek');
  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span> Mengecek database…`;

  try {
    let foundKey  = null;
    let foundData = null;

    // ── Query 1: orderByChild('phone') ─────────────────
    // Butuh index di RTDB Rules: "deposits":{".indexOn":["phone"]}
    try {
      const q1 = await get(
        query(ref(db, 'deposits'), orderByChild('phone'), equalTo(phone))
      );
      if (q1.exists()) {
        q1.forEach(c => {
          const d = c.val();
          // Cari yang status pending
          if (d.status === 'pending' && !foundKey) {
            foundKey  = c.key;
            foundData = d;
          }
        });
      }
    } catch (indexErr) {
      // Index belum diset → fallback: scan semua deposits
      console.warn('Index belum ada, fallback scan all:', indexErr.message);
      const allDeps = await get(ref(db, 'deposits'));
      if (allDeps.exists()) {
        allDeps.forEach(c => {
          const d = c.val();
          if ((d.phone === phone || d.userId === phone) && d.status === 'pending' && !foundKey) {
            foundKey  = c.key;
            foundData = d;
          }
        });
      }
    }

    // ── Query 2 fallback: cek via userId juga ──────────
    if (!foundKey) {
      try {
        const q2 = await get(
          query(ref(db, 'deposits'), orderByChild('userId'), equalTo(phone))
        );
        if (q2.exists()) {
          q2.forEach(c => {
            const d = c.val();
            if (d.status === 'pending' && !foundKey) {
              foundKey  = c.key;
              foundData = d;
            }
          });
        }
      } catch (e2) {
        // sudah fallback di atas
      }
    }

    if (!foundKey) {
      errEl.innerHTML = `
        ❌ Tidak ditemukan deposit <strong>pending</strong> untuk nomor ini.<br/>
        <span style="color:var(--t3);font-weight:400">
          Pastikan nomor benar, atau hubungi admin untuk membuat deposit.
        </span>`;
      btn.disabled = false;
      btn.innerHTML = '🔍 Cek Deposit Saya';
      return;
    }

    S.depKey  = foundKey;
    S.depData = foundData;

    // Kalau sudah ada bukti → tampilkan status
    if (foundData.hasBukti && foundData.buktiUrl) {
      renderAlready();
      return;
    }

    goStep(2);

  } catch (e) {
    console.error('Verify error:', e);
    errEl.textContent = 'Gagal cek database: ' + e.message;
    btn.disabled = false;
    btn.innerHTML = '🔍 Cek Deposit Saya';
  }
};

/* ── Sudah pernah upload ─────────────────────────────── */
function renderAlready() {
  const d = S.depData;
  document.getElementById('CTITLE').textContent = 'Bukti Sudah Dikirim';
  document.getElementById('CBODY').innerHTML = `
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:2.5rem;margin-bottom:8px">📸</div>
      <p style="font-size:.83rem;color:var(--t3);line-height:1.7">
        Bukti transfer sudah dikirim untuk deposit ini.<br/>
        Tunggu admin memverifikasi dan meng-approve.
      </p>
    </div>
    <img class="aimg" src="${d.buktiUrl}" alt="Bukti Transfer"
      onerror="this.style.display='none'" loading="lazy"/>
    <div class="depcard">
      <div class="drow"><span class="dk">Nominal</span><span class="dv" style="color:var(--ac)">${fmt(d.amount)}</span></div>
      <div class="drow"><span class="dk">Metode</span><span class="dv">${d.method||'–'}</span></div>
      <div class="drow"><span class="dk">Status</span><span class="dv" style="color:var(--yel)">Menunggu Verifikasi Admin</span></div>
      <div class="drow"><span class="dk">Dikirim</span><span class="dv">${fmtD(d.buktiUploadedAt)}</span></div>
    </div>
    <div class="info y">
      <div class="ilbl">⏳ Proses</div>
      <div class="ival">Menunggu admin verifikasi</div>
      <div class="isub">Saldo otomatis masuk setelah disetujui. Max 1×24 jam hari kerja.</div>
    </div>
    <button class="btn btg" onclick="goStep(1)" style="margin-top:4px">← Cek Nomor Lain</button>
  `;
}

/* ══════════════════════════════════════════════════════
   STEP 2: Pilih & Upload Foto Bukti
══════════════════════════════════════════════════════ */
function step2() {
  const d = S.depData;
  document.getElementById('CBODY').innerHTML = `
    <!-- Info deposit yang ditemukan -->
    <div class="depcard">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span style="font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)">Deposit Pending Ditemukan ✅</span>
        <span style="font-size:.65rem;color:var(--yel);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);padding:1px 7px;border-radius:99px;font-weight:800">PENDING</span>
      </div>
      <div class="damt">${fmt(d.amount)}</div>
      <div class="drow"><span class="dk">Nomor WA</span><span class="dv">${d.phone||S.phone}</span></div>
      <div class="drow"><span class="dk">Metode</span><span class="dv">${d.method||'–'}</span></div>
      <div class="drow"><span class="dk">Dibuat</span><span class="dv">${fmtD(d.createdAt)}</span></div>
      ${d.name ? `<div class="drow"><span class="dk">Nama</span><span class="dv">${d.name}</span></div>` : ''}
    </div>

    <!-- Upload zone -->
    <p style="font-size:.8rem;color:var(--t2);margin-bottom:11px;font-weight:600">📎 Upload screenshot / foto bukti transfer:</p>
    <div id="pvwArea"></div>
    <div class="uzone" id="uzone" onclick="document.getElementById('fInp').click()">
      <input type="file" id="fInp" accept="image/jpeg,image/png,image/webp,image/jpg" onchange="onFile(event)"/>
      <div class="uico">📸</div>
      <div class="utitle">Tap untuk pilih foto</div>
      <div class="usub">atau drag & drop di sini</div>
      <div class="utypes">
        <span class="utype">JPG</span><span class="utype">PNG</span>
        <span class="utype">WEBP</span><span class="utype">Max 8MB</span>
      </div>
    </div>

    <!-- Progress -->
    <div id="progArea" style="display:none;margin-top:12px">
      <div class="pbg"><div class="pbar" id="pbar"></div></div>
      <div class="plbl" id="plbl">Mengupload…</div>
    </div>

    <!-- Error -->
    <div id="s2err" style="color:var(--red);font-size:.78rem;min-height:15px;margin:9px 0;line-height:1.5"></div>

    <button class="btn" id="btnUp" onclick="doUpload()" disabled style="margin-top:4px">
      📤 Kirim Bukti Transfer
    </button>
    <div style="margin-top:9px">
      <button class="btn btg" onclick="goStep(1)">← Ganti Nomor</button>
    </div>
  `;

  // Drag & drop
  const zone = document.getElementById('uzone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) processFile(f);
  });
}

window.onFile = e => {
  const f = e.target.files[0];
  if (f) processFile(f);
};

function processFile(file) {
  const err = document.getElementById('s2err');
  if (!file.type.startsWith('image/')) {
    err.textContent = 'File harus berupa gambar (JPG / PNG / WEBP).';
    return;
  }
  if (file.size > 8 * 1024 * 1024) {
    err.textContent = 'Ukuran file maksimal 8MB.';
    return;
  }
  err.textContent = '';
  S.file       = file;
  S.previewUrl = URL.createObjectURL(file);

  document.getElementById('pvwArea').innerHTML = `
    <div class="pvw">
      <img class="pvwimg" src="${S.previewUrl}" alt="Preview"/>
      <button class="pvwclr" onclick="clearFile()">✕</button>
      <div class="pvwname">${file.name} · ${(file.size / 1024 / 1024).toFixed(2)} MB</div>
    </div>
  `;

  const zone = document.getElementById('uzone');
  zone.classList.add('has');
  zone.querySelector('.utitle').textContent = 'Foto dipilih ✅';
  zone.querySelector('.usub').textContent   = 'Tap untuk ganti foto';
  document.getElementById('btnUp').disabled = false;
}

window.clearFile = () => {
  S.file = null; S.previewUrl = null;
  document.getElementById('pvwArea').innerHTML = '';
  document.getElementById('fInp').value = '';
  const zone = document.getElementById('uzone');
  zone.classList.remove('has');
  zone.querySelector('.utitle').textContent = 'Tap untuk pilih foto';
  zone.querySelector('.usub').textContent   = 'atau drag & drop di sini';
  document.getElementById('btnUp').disabled = true;
};

/* ══════════════════════════════════════════════════════
   STEP 2 ACTION: Upload ke Cloudinary → Update RTDB
══════════════════════════════════════════════════════ */
window.doUpload = async () => {
  if (!S.file) { toast('Pilih foto dulu', 'err'); return; }

  const btn  = document.getElementById('btnUp');
  const err  = document.getElementById('s2err');
  const pa   = document.getElementById('progArea');
  const pb   = document.getElementById('pbar');
  const pl   = document.getElementById('plbl');

  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span> Mengupload foto…`;
  err.textContent = '';
  pa.style.display = 'block';

  try {
    /* ── 1. Upload gambar ke Cloudinary (unsigned) ──────── */
    const fd = new FormData();
    fd.append('file',           S.file);
    fd.append('upload_preset',  CLOUD_PRESET);
    fd.append('folder',         `bukti_deposit/${S.phone}`);
    fd.append('tags',           `deposit,${S.phone},${S.depKey}`);

    const cloudUrl = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', UPLOAD_URL);

      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 85);
          pb.style.width  = pct + '%';
          pl.textContent  = `Mengupload… ${pct}%`;
        }
      };

      xhr.onload = () => {
        if (xhr.status === 200) {
          pb.style.width = '95%';
          pl.textContent = 'Upload selesai!';
          try {
            resolve(JSON.parse(xhr.responseText).secure_url);
          } catch (e) {
            reject(new Error('Response tidak valid dari Cloudinary'));
          }
        } else {
          let msg = 'Upload gagal (status ' + xhr.status + ')';
          try {
            const r = JSON.parse(xhr.responseText);
            msg = r.error?.message || msg;
          } catch (e) {}
          reject(new Error(msg));
        }
      };

      xhr.onerror = () => reject(new Error('Koneksi gagal saat upload. Cek internet.'));
      xhr.ontimeout = () => reject(new Error('Upload timeout. Coba lagi.'));
      xhr.timeout = 60000; // 60 detik
      xhr.send(fd);
    });

    /* ── 2. Update RTDB /deposits/{key} ─────────────────── */
    // onValue di admin panel langsung fire → UI admin auto update realtime
    pl.textContent = 'Menyimpan ke database…';

    await update(ref(db, `deposits/${S.depKey}`), {
      buktiUrl:        cloudUrl,
      buktiUploadedAt: Date.now(),
      buktiPhone:      S.phone,
      hasBukti:        true,
      hasBuktiNew:     true   // flag untuk admin panel (highlight di dashboard)
      // status tetap 'pending' — admin yang approve, tidak auto
    });

    pb.style.width = '100%';
    pl.textContent = 'Tersimpan di Realtime Database ✅';

    goStep(3);

  } catch (e) {
    console.error('Upload error:', e);
    err.textContent = '❌ ' + e.message;
    btn.disabled = false;
    btn.innerHTML = '📤 Kirim Bukti Transfer';
    pa.style.display = 'none';
  }
};
